# Docker Compose Demo Configuration
# Copy this file to docker-compose.yml and customize for your deployment
# cp docker-compose.demo.yml docker-compose.yml

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fund-manager-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:///data/fund_manager.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ACCESS_TOKEN_EXPIRE_DAYS=7
    volumes:
      # TODO: Replace target_data_path with your actual data directory
      # Example: /home/user/fund_data:/app/data
      - target_data_path:/app/data
    networks:
      - fund-manager-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fund-manager-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - fund-manager-network

  nginx:
    image: nginx:alpine
    container_name: fund-manager-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fund-manager-network

networks:
  fund-manager-network:
    driver: bridge
